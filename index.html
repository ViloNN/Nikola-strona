<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dla Ciebie ❤️</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Montserrat:wght@400;600&display=swap');

        body {
            margin: 0;
            padding: 0;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            /* Animowane tło gradientowe */
            background: linear-gradient(-45deg, #ff0844, #ffb199, #ff1493, #8a2387);
            background-size: 400% 400%;
            animation: gradientBG 10s ease infinite;
            font-family: 'Montserrat', sans-serif;
            overflow: hidden;
            text-align: center;
            cursor: pointer; /* Zmienia kursor, sugerując możliwość kliknięcia */
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .container {
            z-index: 10;
            background: rgba(255, 255, 255, 0.15);
            padding: 50px 60px;
            border-radius: 30px;
            box-shadow: 0 0 40px rgba(255, 20, 147, 0.5), inset 0 0 20px rgba(255, 255, 255, 0.5);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.3);
            transform: scale(0.9);
            animation: floatCard 4s ease-in-out infinite;
            max-width: 80%;
        }

        @keyframes floatCard {
            0% { transform: translateY(0px) scale(0.95); box-shadow: 0 0 40px rgba(255, 20, 147, 0.5); }
            50% { transform: translateY(-15px) scale(1); box-shadow: 0 0 60px rgba(255, 20, 147, 0.8); }
            100% { transform: translateY(0px) scale(0.95); box-shadow: 0 0 40px rgba(255, 20, 147, 0.5); }
        }

        h1 {
            font-family: 'Dancing Script', cursive;
            color: #ffffff;
            font-size: 6rem;
            margin: 0 0 20px 0;
            text-shadow: 0 0 20px rgba(255, 255, 255, 0.8), 0 0 30px #ff1493;
            animation: heartbeat 1.5s infinite;
        }

        @keyframes heartbeat {
            0%, 100% { transform: scale(1); }
            10%, 30% { transform: scale(1.1); }
            20% { transform: scale(1); }
        }

        .poem {
            color: #fff;
            font-size: 1.5rem;
            line-height: 1.8;
            min-height: 120px; /* Miejsce na wiersz */
            text-shadow: 1px 1px 5px rgba(0, 0, 0, 0.3);
            font-weight: 600;
        }

        .instruction {
            margin-top: 30px;
            font-size: 0.9rem;
            color: rgba(255, 255, 255, 0.7);
            letter-spacing: 2px;
            text-transform: uppercase;
            animation: pulseText 2s infinite;
        }

        @keyframes pulseText {
            0%, 100% { opacity: 0.5; }
            50% { opacity: 1; }
        }

        /* Automatyczne serduszka w tle */
        .heart {
            position: absolute;
            color: rgba(255, 255, 255, 0.6);
            pointer-events: none;
            animation: floatUp linear infinite;
        }

        @keyframes floatUp {
            0% { transform: translateY(100vh) scale(0) rotate(0deg); opacity: 1; }
            100% { transform: translateY(-10vh) scale(1.5) rotate(360deg); opacity: 0; }
        }

        /* Serduszka pojawiające się przy kliknięciu */
        .click-heart {
            position: absolute;
            color: #ff1493;
            text-shadow: 0 0 10px rgba(255, 255, 255, 0.8);
            pointer-events: none;
            animation: burst 1s ease-out forwards;
        }

        @keyframes burst {
            0% { transform: scale(0) translate(0, 0); opacity: 1; }
            100% { transform: scale(1.5) translate(var(--tx), var(--ty)); opacity: 0; }
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>Kocham Cię! ❤️</h1>
        <div class="poem" id="poem-container"></div>
        <div class="instruction">Kliknij gdziekolwiek na ekranie ✨</div>
    </div>

    <script>
        // --- EFEKT PISANIA NA MASZYNIE (WIERSZYK) ---
        const poemLines = [
            "Dla Ciebie bije serce me,",
            "Z każdym oddechem kocham Cię.",
            "Jesteś jak słońce w pochmurny dzień,",
            "Rozjaśniasz każdy mój smutek i cień. ✨"
        ];
        
        const poemContainer = document.getElementById('poem-container');
        let lineIndex = 0;
        let charIndex = 0;

        function typeWriter() {
            if (lineIndex < poemLines.length) {
                if (charIndex < poemLines[lineIndex].length) {
                    poemContainer.innerHTML += poemLines[lineIndex].charAt(charIndex);
                    charIndex++;
                    setTimeout(typeWriter, 50); // Prędkość pisania liter
                } else {
                    poemContainer.innerHTML += "<br>"; // Nowa linia
                    lineIndex++;
                    charIndex = 0;
                    setTimeout(typeWriter, 500); // Pauza między linijkami
                }
            }
        }

        // Rozpocznij pisanie po 1 sekundzie od załadowania
        setTimeout(typeWriter, 1000);

        // --- AUTOMATYCZNIE LATAJĄCE SERDUSZKA (TŁO) ---
        function createBackgroundHeart() {
            const heart = document.createElement('div');
            heart.classList.add('heart');
            
            // Losowe kolory i symbole
            const symbols = ['❤️', '💖', '✨', '💕'];
            heart.innerHTML = symbols[Math.floor(Math.random() * symbols.length)];
            
            heart.style.left = Math.random() * 100 + 'vw';
            heart.style.animationDuration = Math.random() * 3 + 4 + 's';
            heart.style.fontSize = Math.random() * 1.5 + 1 + 'rem';

            document.body.appendChild(heart);

            setTimeout(() => {
                heart.remove();
            }, 7000);
        }

        setInterval(createBackgroundHeart, 400);

        // --- EFEKT WYBUCHU SERDUSZEK PO KLIKNIĘCIU ---
        document.addEventListener('click', function(e) {
            const numHearts = 10; // Ilość serduszek przy jednym kliknięciu
            
            for (let i = 0; i < numHearts; i++) {
                const clickHeart = document.createElement('div');
                clickHeart.classList.add('click-heart');
                clickHeart.innerHTML = '❤️';
                
                // Pozycja kliknięcia
                clickHeart.style.left = e.clientX + 'px';
                clickHeart.style.top = e.clientY + 'px';
                
                // Losowy kierunek rozbłysku
                const angle = Math.random() * Math.PI * 2;
                const distance = Math.random() * 100 + 50;
                const tx = Math.cos(angle) * distance + 'px';
                const ty = Math.sin(angle) * distance + 'px';
                
                clickHeart.style.setProperty('--tx', tx);
                clickHeart.style.setProperty('--ty', ty);
                
                // Losowa wielkość
                clickHeart.style.fontSize = Math.random() * 2 + 1 + 'rem';
                
                document.body.appendChild(clickHeart);
                
                setTimeout(() => {
                    clickHeart.remove();
                }, 1000);
            }
        });
    </script>

</body>
</html>
