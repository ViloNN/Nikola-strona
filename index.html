<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Tylko dla Ciebie ❤️</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Montserrat:wght@400;600&display=swap');

        body {
            margin: 0;
            padding: 0;
            height: 100vh;
            background: radial-gradient(circle at center, #4a0010 0%, #1a0005 100%);
            overflow: hidden;
            font-family: 'Montserrat', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        #canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
            touch-action: none; 
        }

        .card {
            position: relative;
            z-index: 10;
            background: rgba(255, 255, 255, 0.05);
            padding: 40px;
            border-radius: 25px;
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.15);
            box-shadow: 0 15px 35px rgba(0,0,0,0.8), inset 0 0 20px rgba(255,20,147,0.2);
            text-align: center;
            width: 85%;
            max-width: 420px;
            transition: transform 0.3s ease;
        }

        h1 {
            font-family: 'Dancing Script', cursive;
            color: #ffb3c1;
            font-size: 3.5rem;
            margin: 0 0 15px 0;
            text-shadow: 0 0 20px rgba(255, 20, 147, 0.8);
        }

        #message {
            color: #fff;
            font-size: 1.3rem;
            line-height: 1.6;
            margin-bottom: 30px;
            min-height: 80px; /* Stała wysokość, żeby karta nie skakała */
            display: flex;
            align-items: center;
            justify-content: center;
            text-shadow: 1px 1px 4px rgba(0,0,0,0.5);
            transition: opacity 0.3s ease;
        }

        .btn {
            background: linear-gradient(45deg, #ff0844, #ffb199);
            border: none;
            padding: 15px 30px;
            border-radius: 50px;
            color: white;
            font-size: 1.2rem;
            font-family: 'Montserrat', sans-serif;
            font-weight: 600;
            cursor: pointer;
            box-shadow: 0 10px 20px rgba(255, 8, 68, 0.4);
            transition: all 0.3s ease;
            animation: pulseBtn 2s infinite;
        }

        .btn:hover, .btn:active {
            transform: scale(1.1);
            box-shadow: 0 15px 25px rgba(255, 8, 68, 0.6);
        }

        @keyframes pulseBtn {
            0%, 100% { box-shadow: 0 0 15px rgba(255, 8, 68, 0.4); }
            50% { box-shadow: 0 0 30px rgba(255, 8, 68, 0.8); }
        }

    </style>
</head>
<body>

    <canvas id="canvas"></canvas>

    <div class="card" id="card">
        <h1>Dla Ciebie</h1>
        <div id="message">Kliknij przycisk poniżej, aby zacząć... ✨</div>
        <button class="btn" id="loveBtn">Kliknij mnie ❤️</button>
    </div>

    <script>
        const canvas = document.getElementById('canvas');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;

        let particles = [];
        const colors = ['#ff4d6d', '#ff758f', '#ffb3c1', '#c9184a', '#ffffff'];

        // --- OBSŁUGA TEKSTÓW NA KARCIE ---
        const messages = [
            "Każdy dzień z Tobą to prawdziwa magia. ✨",
            "Uwielbiam Twój uśmiech, rozjaśnia mój świat.",
            "Jesteś najwspanialszą osobą, jaką znam.",
            "Moje serce bije tylko dla Ciebie.",
            "Kocham Cię najbardziej na świecie! ❤️"
        ];
        let msgIndex = 0;
        const msgElement = document.getElementById('message');
        const loveBtn = document.getElementById('loveBtn');
        const card = document.getElementById('card');

        loveBtn.addEventListener('click', (e) => {
            // Zmiana tekstu z efektem zanikania
            msgElement.style.opacity = 0;
            setTimeout(() => {
                msgElement.innerHTML = messages[msgIndex];
                msgElement.style.opacity = 1;
                msgIndex = (msgIndex + 1) % messages.length;
            }, 300);

            // Gigantyczna eksplozja z przycisku
            const rect = loveBtn.getBoundingClientRect();
            createExplosion(rect.left + rect.width / 2, rect.top + rect.height / 2, 40);
            
            // Lekkie podskoczenie karty
            card.style.transform = 'scale(1.05)';
            setTimeout(() => card.style.transform = 'scale(1)', 200);
            
            e.stopPropagation(); // Zapobiega podwójnej eksplozji z tła
        });

        // --- MYSZ I DOTYK (ŚLAD I EKSPLOZJE) ---
        let mouse = { x: null, y: null };

        function updateMouse(e) {
            if (e.touches) {
                mouse.x = e.touches[0].clientX;
                mouse.y = e.touches[0].clientY;
            } else {
                mouse.x = e.clientX;
                mouse.y = e.clientY;
            }
            // Zostawianie śladu przy ruchu
            createTrail(mouse.x, mouse.y);
        }

        window.addEventListener('mousemove', updateMouse);
        window.addEventListener('touchmove', (e) => { updateMouse(e); e.preventDefault(); }, { passive: false });

        // Eksplozja po kliknięciu w tło
        window.addEventListener('click', (e) => {
            if(e.target === canvas) {
                createExplosion(e.clientX, e.clientY, 15);
            }
        });
        window.addEventListener('touchstart', (e) => {
            if(e.target === canvas) {
                createExplosion(e.touches[0].clientX, e.touches[0].clientY, 15);
            }
        });

        // --- KLASY CZĄSTECZEK (SERDUSZEK) ---
        class Particle {
            constructor(x, y, speedX, speedY, size, color, isTrail = false) {
                this.x = x;
                this.y = y;
                this.speedX = speedX;
                this.speedY = speedY;
                this.size = size;
                this.color = color;
                this.life = 1; // Od 1 do 0 (zanikanie)
                this.decay = isTrail ? Math.random() * 0.05 + 0.02 : Math.random() * 0.02 + 0.01;
                this.isTrail = isTrail;
            }

            draw() {
                ctx.save();
                ctx.globalAlpha = this.life;
                ctx.fillStyle = this.color;
                ctx.beginPath();
                // Rysowanie serca
                ctx.moveTo(this.x, this.y + this.size / 4);
                ctx.bezierCurveTo(this.x, this.y, this.x - this.size / 2, this.y, this.x - this.size / 2, this.y + this.size / 4);
                ctx.bezierCurveTo(this.x - this.size / 2, this.y + (this.size * 5) / 8, this.x, this.y + (this.size * 7) / 8, this.x, this.y + this.size);
                ctx.bezierCurveTo(this.x, this.y + (this.size * 7) / 8, this.x + this.size / 2, this.y + (this.size * 5) / 8, this.x + this.size / 2, this.y + this.size / 4);
                ctx.bezierCurveTo(this.x + this.size / 2, this.y, this.x, this.y, this.x, this.y + this.size / 4);
                ctx.fill();
                ctx.restore();
            }

            update() {
                this.x += this.speedX;
                this.y += this.speedY;
                this.life -= this.decay;

                // Grawitacja dla eksplozji
                if (!this.isTrail) {
                    this.speedY += 0.05; 
                }
                
                this.draw();
            }
        }

        // --- GENERATORY ---
        function createTrail(x, y) {
            // Dodaje tylko kilka cząsteczek przy każdym ruchu, żeby nie zaciąć przeglądarki
            for (let i = 0; i < 2; i++) {
                let size = Math.random() * 8 + 3;
                let speedX = (Math.random() - 0.5) * 2;
                let speedY = (Math.random() - 0.5) * 2;
                let color = colors[Math.floor(Math.random() * colors.length)];
                particles.push(new Particle(x, y, speedX, speedY, size, color, true));
            }
        }

        function createExplosion(x, y, amount) {
            for (let i = 0; i < amount; i++) {
                let size = Math.random() * 12 + 5;
                // Rozrzut we wszystkich kierunkach
                let angle = Math.random() * Math.PI * 2;
                let speed = Math.random() * 5 + 2;
                let speedX = Math.cos(angle) * speed;
                let speedY = Math.sin(angle) * speed;
                let color = colors[Math.floor(Math.random() * colors.length)];
                particles.push(new Particle(x, y, speedX, speedY, size, color, false));
            }
        }

        // Tło - powolne bąbelki serc lecące z dołu
        function spawnBackgroundHearts() {
            if (Math.random() < 0.1) { // Częstotliwość pojawiania się
                let x = Math.random() * canvas.width;
                let y = canvas.height + 20;
                let size = Math.random() * 15 + 5;
                let speedX = (Math.random() - 0.5) * 1;
                let speedY = -(Math.random() * 2 + 1);
                let color = colors[Math.floor(Math.random() * colors.length)];
                let p = new Particle(x, y, speedX, speedY, size, color, true);
                p.decay = 0.002; // Bardzo wolno znikają
                particles.push(p);
            }
        }

        // Pętla animacji
        function animate() {
            requestAnimationFrame(animate);
            // Tworzy lekki efekt smużenia
            ctx.fillStyle = 'rgba(26, 0, 5, 0.3)';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            spawnBackgroundHearts();

            for (let i = 0; i < particles.length; i++) {
                particles[i].update();
                // Usuwanie martwych cząsteczek
                if (particles[i].life <= 0) {
                    particles.splice(i, 1);
                    i--;
                }
            }
        }

        window.addEventListener('resize', () => {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        });

        animate();
    </script>
</body>
</html>
